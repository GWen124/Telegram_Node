name: 🚀 Auto Update Network Nodes

# ==========================================
# 触发条件设置
# ==========================================
on:
  workflow_dispatch: # 允许在网页端手动点击 "Run workflow" 运行
  schedule:
    - cron: '0 0 * * *' # 每天自动运行一次 (UTC时间0点，即北京时间早上8点)
  push:
    paths:
      - 'sources.yaml'   # 当修改此配置文件时自动触发
      - 'Nodes/**'       # 当 Nodes 文件夹里增加或修改节点文件时自动触发

jobs:
  run-all:
    runs-on: ubuntu-24.04
    permissions:
      contents: write # 赋予 GitHub Action 推送代码的权限

    steps:
      - name: 1. Checkout Repository (拉取仓库代码)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. Setup Python 3.10 (配置 Python 环境)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Python Dependencies (安装依赖)
        run: pip install requests pyyaml

      - name: 4. Install & Connect Cloudflare WARP (配置网络防屏蔽环境)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp -y
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          sleep 5
          curl -4 ifconfig.me

      - name: 5. Run fetch.py (执行动态抓取与聚合)
        run: python fetch.py

      - name: 6. Subconverter Parse (使用 cmliu 增强版转换节点)
        run: |
          # 启动 cmliu/subconverter 增强版容器，完美支持前沿协议
          docker run -d --network host cmliu/subconverter:latest
          sleep 5
          
          # 核心防冲突：先杀掉可能残留的进程，然后再启动本地 HTTP 服务
          fuser -k 8000/tcp || true
          python -m http.server 8000 &
          sleep 2
          
          # 通过 Subconverter 获取初筛并转换好的节点配置
          API_URL=$(cat sub_api_url.txt)
          curl -s "$API_URL" > clash_nodes.yaml

      - name: 7. Run Mihomo Speed Test (启动 Mihomo 内核硬核测速)
        run: |
          # 下载最新的 Mihomo 内核
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz
          gunzip mihomo-linux-amd64-v1.18.3.gz
          mv mihomo-linux-amd64-v1.18.3 mihomo
          chmod +x mihomo
          
          # 执行精筛测速与去重
          python check.py

      - name: 8. Generate Universal Base64 Sub (生成通用 txt 订阅格式)
        run: |
          # 此时 cmliu 的转换器会把 YAML 里的 Hysteria2 等新协议完美保留并转为 TXT
          curl -s "http://127.0.0.1:25500/sub?target=mixed&url=http://127.0.0.1:8000/final_sub.yaml" > final_sub.txt

      - name: 9. Clean Nodes, Commit & Push (阅后即焚与推送)
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          
          # 🌟 核心清理逻辑：清空 Nodes 文件夹下的所有临时文件，但保留文件夹结构
          rm -f Nodes/* || true
          touch Nodes/.gitkeep
          
          # 将生成的文件、配置文件、清理后的 Nodes 文件夹加入暂存区
          git add final_sub.yaml final_sub.txt tg_nodes.txt sources.yaml Nodes/ || true
          
          # 🌟 极其关键：必须携带 [skip ci] 魔法后缀，打断无限触发循环！
          git commit -m "🚀 Auto update High-Speed nodes & Cleaned Nodes Dir: $(date) [skip ci]" || echo "No changes to commit"
          
          # 终极无敌防冲突合并策略
          git pull origin main --rebase=false -X ours || (git add tg_nodes.txt final_sub.yaml final_sub.txt Nodes/ || true && git commit -m "Auto resolve merge conflicts [skip ci]" || true)
          git push
